openapi: 3.0.1
info:
  title: GroceryStore API V1
  version: v1
  description: API for GroceryStore application with Products, Orders, and Users
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: successful
  /api/v1/auth/signup:
    post:
      summary: Register new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: user created
  /api/v1/products:
    get:
      summary: List all products
      tags:
        - Products
      responses:
        '200':
          description: successful
    post:
      summary: Create a product
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                    price:
                      type: number
                    stock:
                      type: integer
                    description:
                      type: string
                    category:
                      type: string
                    brand:
                      type: string
      responses:
        '201':
          description: product created
  /api/v1/products/{id}:
    get:
      summary: Get a product
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
    patch:
      summary: Update a product
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
    delete:
      summary: Delete a product
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: no content
  /api/v1/orders:
    get:
      summary: List orders
      tags:
        - Orders
      security:
        - Bearer: []
      responses:
        '200':
          description: successful
    post:
      summary: Create an order
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: object
                  properties:
                    total:
                      type: number
                    delivery_address:
                      type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
                      price:
                        type: number
      responses:
        '201':
          description: order created
  /api/v1/orders/{id}/update_status:
    patch:
      summary: Update order status (Admin only)
      tags:
        - Orders
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, processing, shipped, delivered, cancelled]
      responses:
        '200':
          description: status updated
  /api/v1/paypal/create-order:
    post:
      summary: Create a PayPal Order
      tags:
        - PayPal
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: integer
      responses:
        '200':
          description: PayPal order created
  /api/v1/paypal/capture-order:
    post:
      summary: Capture a PayPal Payment
      tags:
        - PayPal
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paypalOrderId:
                  type: string
                order_id:
                  type: integer
      responses:
        '200':
          description: Payment successful
  /api/v1/categories:
    get:
      summary: List all categories
      tags:
        - Categories
      responses:
        '200':
          description: successful
  /api/v1/categories/{id}:
    get:
      summary: Get a category
      tags:
        - Categories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
  /api/v1/brands:
    get:
      summary: List all brands
      tags:
        - Brands
      responses:
        '200':
          description: successful
  /api/v1/brands/{id}:
    get:
      summary: Get a brand
      tags:
        - Brands
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
  /api/v1/addresses:
    get:
      summary: List addresses for user
      tags:
        - Addresses
      security:
        - Bearer: []
      responses:
        '200':
          description: successful
    post:
      summary: Create an address
      tags:
        - Addresses
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: object
                  properties:
                    label:
                      type: string
                    street:
                      type: string
                    city:
                      type: string
                    zip_code:
                      type: string
                    country:
                      type: string
      responses:
        '201':
          description: created
  /api/v1/addresses/{id}:
    patch:
      summary: Update an address
      tags:
        - Addresses
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
    delete:
      summary: Delete an address
      tags:
        - Addresses
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: no content
  /api/v1/addresses/{id}/set_default:
    patch:
      summary: Set address as default
      tags:
        - Addresses
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: successful
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
  - url: http://localhost:5001
    description: Development server
