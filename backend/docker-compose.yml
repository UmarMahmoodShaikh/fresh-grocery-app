version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: grocery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL certificates in production environment and new changes
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - grocery-store-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for Caching and Sidekiq
  redis:
    image: redis:7-alpine
    container_name: grocery-redis
    restart: unless-stopped
    networks:
      - grocery-store-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rails Backend (API)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: grocery-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/rails
      - /rails/tmp
      - /rails/log
    networks:
      - grocery-store-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/products"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: bundle exec rails server -b 0.0.0.0 -p 5000

  # Sidekiq for Background Jobs
  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: grocery-sidekiq
    restart: unless-stopped
    env_file: .env
    environment:
      - RAILS_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/rails
    networks:
      - grocery-store-network
    depends_on:
      - redis
    command: bundle exec sidekiq

  # Vite Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
        - VITE_USE_MOCK=false
        - VITE_BACKEND_URL=
    container_name: grocery-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - grocery-store-network
    depends_on:
      - backend

networks:
  grocery-store-network:
    driver: bridge

volumes:
  redis_data:
