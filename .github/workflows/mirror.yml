name: Mirror to Personal Repo

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  mirror:
    if: github.repository == 'EpitechMscInternationalPromo2027/I-YEP-800-INT-7-1-capstone-1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror push to personal repo
        env:
          # Using both common secret names as fallbacks
          PAT: ${{ secrets.MIRROR_PAT || secrets.PERSONAL_TOKEN }}
        run: |
          # Add the personal repo as a remote with the token embedded in the URL
          git remote add personal "https://UmarMahmoodShaikh:${PAT}@github.com/UmarMahmoodShaikh/fresh-grocery-app.git"
          
          # Force push all branches and tags safely without deleting destination default branch
          git push --force personal "+refs/heads/*:refs/heads/*"
          git push --force personal --tags

