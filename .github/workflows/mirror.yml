name: Mirror to Personal Repo

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret exists
        env:
          PAT: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "SECRET IS EMPTY - this is the problem"
          else
            echo "Secret length: ${#PAT}"
          fi

      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror push to personal repo
        env:
          PAT: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://UmarMahmoodShaikh:${PAT}@github.com" > ~/.git-credentials
          git remote add personal https://github.com/UmarMahmoodShaikh/fresh-grocery-app.git
          git push personal --mirror
