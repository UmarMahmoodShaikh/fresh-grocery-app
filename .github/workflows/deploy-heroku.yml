name: Deploy Backend to Heroku

on:
  push:
    branches:
      - umar/dev
      - master
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-heroku.yml"

jobs:
  deploy:
    # This runs only on your PERSONAL repo after it is mirrored
    if: github.repository == 'UmarMahmoodShaikh/fresh-grocery-app'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Subdirectory to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Configure git
          git config --global user.email "umarmahmoodshk@gmail.com"
          git config --global user.name "GitHub Action"

          # Use subtree push to send only the backend folder to Heroku
          # We use the API key in the URL for authentication
          git remote add heroku https://x:$HEROKU_API_KEY@git.heroku.com/fresh-grocery-store.git

          # Force push the backend subdirectory to Heroku's master branch
          git push heroku `git subtree split --prefix backend HEAD`:refs/heads/master --force
